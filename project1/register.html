 <!DOCTYPE html>
<html>
<head>
  <title>Create Account</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg">

<div class="card">
  <h2>Create Account</h2>

  <input type="text" id="regUser" placeholder="Username">
  <input type="email" id="regEmail" placeholder="Email (Gmail)">
  <input type="tel" id="regMobile" placeholder="Mobile Number">

  <div class="input-box">
    <input type="password" id="regPass" placeholder="Password">
    <i class="fa-solid fa-eye eye" onclick="togglePassword('regPass', this)"></i>
  </div>

  <div class="input-box">
    <input type="password" id="regConfirm" placeholder="Confirm Password">
    <i class="fa-solid fa-eye eye" onclick="togglePassword('regConfirm', this)"></i>
  </div>

  <button onclick="register()">Register</button>

  <p class="link">
    Already have an account?
    <a href="index.html">Login</a>
  </p>
</div>

<script src="auth.js"></script>
</body>
</html>
